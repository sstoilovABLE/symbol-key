name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip publishing the release'
        required: false
        default: true
        type: boolean
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    name: Compile and publish release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install AutoHotkey v2 and Ahk2Exe compiler
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          # Authenticate the GitHub API calls below. Anonymous requests are
          # limited to 60/hour per runner IP, which is shared across GitHub's
          # hosted runners and is routinely exhausted; authenticated requests
          # get 1,000/hour, so send the workflow token with each API call.
          $apiHeaders = @{ Authorization = "Bearer $env:GH_TOKEN" }

          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/latest' -Headers $apiHeaders
          $asset = $release.assets |
            Where-Object { $_.name -match '^AutoHotkey_.*\.zip$' } |
            Select-Object -First 1

          if (-not $asset) {
            throw 'Could not find the AutoHotkey release zip asset.'
          }

          $zipPath = Join-Path $env:RUNNER_TEMP $asset.name
          $installDir = Join-Path $env:RUNNER_TEMP 'autohotkey'

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $installDir -Force

          # The AutoHotkey runtime zip ships only the interpreter executables.
          # The Ahk2Exe compiler is released from a separate repository, so it
          # must be downloaded and extracted independently.
          $ahk2ExeRelease = Invoke-RestMethod -Uri 'https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest' -Headers $apiHeaders
          $ahk2ExeAsset = $ahk2ExeRelease.assets |
            Where-Object { $_.name -match '^Ahk2Exe.*\.zip$' } |
            Select-Object -First 1

          if (-not $ahk2ExeAsset) {
            throw 'Could not find the Ahk2Exe release zip asset.'
          }

          $ahk2ExeZipPath = Join-Path $env:RUNNER_TEMP $ahk2ExeAsset.name
          $ahk2ExeInstallDir = Join-Path $env:RUNNER_TEMP 'ahk2exe'

          Invoke-WebRequest -Uri $ahk2ExeAsset.browser_download_url -OutFile $ahk2ExeZipPath
          Expand-Archive -Path $ahk2ExeZipPath -DestinationPath $ahk2ExeInstallDir -Force

          $ahk2Exe = Get-ChildItem -Path $ahk2ExeInstallDir -Recurse -Filter 'Ahk2Exe.exe' |
            Select-Object -First 1
          $baseExe = Get-ChildItem -Path $installDir -Recurse -Filter 'AutoHotkey64.exe' |
            Select-Object -First 1

          if (-not $ahk2Exe) {
            throw 'Could not find Ahk2Exe.exe after extraction.'
          }

          if (-not $baseExe) {
            throw 'Could not find AutoHotkey64.exe after extraction.'
          }

          "AHK2EXE=$($ahk2Exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AHK_BASE_EXE=$($baseExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compile executable
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $outputPath = Join-Path $env:RUNNER_TEMP 'SymbolKey.exe'
          $iconPath = Join-Path $PWD 'SymbolKey.ico'

          if (-not (Test-Path $iconPath)) {
            throw "Icon file not found: $iconPath"
          }

          # Ahk2Exe.exe is a GUI-subsystem application, so invoking it directly
          # returns before compilation completes. Start-Process -Wait blocks
          # until the process exits so the output file is guaranteed to exist.
          $ahk2ExeArgs = @(
            '/in', '.\SymbolKey.ahk',
            '/out', $outputPath,
            '/base', $env:AHK_BASE_EXE,
            '/icon', $iconPath
          )

          $process = Start-Process -FilePath $env:AHK2EXE -ArgumentList $ahk2ExeArgs -Wait -PassThru -NoNewWindow

          if ($process.ExitCode -ne 0) {
            throw "Ahk2Exe exited with code $($process.ExitCode)."
          }

          if (-not (Test-Path $outputPath)) {
            throw "Compilation finished without creating $outputPath."
          }

          "RELEASE_ASSET=$outputPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload compiled executable
        uses: actions/upload-artifact@v4
        with:
          name: SymbolKey
          path: ${{ env.RELEASE_ASSET }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: ${{ !inputs.dry_run }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          gh release create "$env:GITHUB_REF_NAME" "$env:RELEASE_ASSET" `
            --title "$env:GITHUB_REF_NAME" `
            --notes-from-tag

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run only; release publishing skipped."
